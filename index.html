<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Habits</title>
  <meta name="description" content="GitHub-style habit tracker">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Habits">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">
      <svg class="logo" viewBox="0 0 16 16" width="22" height="22" aria-hidden="true">
        <rect x="0"  y="0"  width="7" height="7" rx="1.5" fill="var(--cell-l2)"/>
        <rect x="9"  y="0"  width="7" height="7" rx="1.5" fill="var(--cell-l4)"/>
        <rect x="0"  y="9"  width="7" height="7" rx="1.5" fill="var(--cell-l3)"/>
        <rect x="9"  y="9"  width="7" height="7" rx="1.5" fill="var(--cell-l1)"/>
      </svg>
      Habits
    </h1>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294a6.214 6.214 0 0 1 0 .772c-.01.147.039.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.102-.302c-.067-.019-.177-.011-.3.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.29 1.106c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.289-1.106c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.05-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.038-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.102.302c.067.019.177.011.3-.071.214-.143.437-.272.668-.386.133-.066.194-.158.211-.224l.29-1.106C6.009.645 6.556.095 7.299.03 7.53.01 7.764 0 8 0Zm-.571 1.525c-.036.003-.108.036-.137.146l-.289 1.105c-.147.561-.549.967-.998 1.189-.173.086-.34.183-.5.29-.417.278-.97.423-1.529.27l-1.103-.303c-.109-.03-.175.016-.195.045-.22.312-.412.644-.573.99-.014.031-.021.11.059.19l.815.806c.411.406.562.957.53 1.456a4.709 4.709 0 0 0 0 .582c.032.499-.119 1.05-.53 1.456l-.815.806c-.081.08-.073.159-.059.19.162.346.353.677.573.989.02.03.085.076.195.046l1.102-.303c.56-.153 1.113-.008 1.53.27.161.107.328.204.501.29.447.222.85.629.997 1.189l.289 1.105c.029.109.101.143.137.146a6.6 6.6 0 0 0 1.142 0c.036-.003.108-.036.137-.146l.289-1.105c.147-.561.549-.967.998-1.189.173-.086.34-.183.5-.29.417-.278.97-.423 1.529-.27l1.103.303c.109.029.175-.016.195-.045.22-.313.411-.644.573-.99.014-.031.021-.11-.059-.19l-.815-.806c-.411-.406-.562-.957-.53-1.456a4.709 4.709 0 0 0 0-.582c-.032-.499.119-1.05.53-1.456l.815-.806c.081-.08.073-.159.059-.19a6.464 6.464 0 0 0-.573-.989c-.02-.03-.085-.076-.195-.046l-1.102.303c-.56.153-1.113.008-1.53-.27a4.44 4.44 0 0 0-.501-.29c-.447-.222-.85-.629-.997-1.189l-.289-1.105c-.029-.11-.101-.143-.137-.146a6.6 6.6 0 0 0-1.142 0ZM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM9.5 8a1.5 1.5 0 1 0-3.001.001A1.5 1.5 0 0 0 9.5 8Z"/></svg>
      </button>
      <button class="btn btn-primary" id="addHabitBtn">+ New habit</button>
    </div>
  </header>

  <main class="container">
    <section class="card overview-card" id="overviewCard" hidden>
      <div class="overview-head">
        <svg class="ring" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <circle class="ring-track" cx="32" cy="32" r="26"/>
          <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="26"/>
          <text class="ring-text" id="ringText" x="32" y="37" text-anchor="middle">0%</text>
        </svg>
        <div>
          <h2 class="overview-title">Today</h2>
          <p class="muted small" id="overviewSubtitle"></p>
        </div>
      </div>
      <div class="stat-tiles" id="globalTiles"></div>
      <div class="heatmap-wrap">
        <div class="heatmap" id="overviewHeatmap"></div>
      </div>
      <div class="legend">
        <span class="muted small">Less</span>
        <span class="legend-cell" style="background:var(--cell-l0)"></span>
        <span class="legend-cell" style="background:var(--cell-l1)"></span>
        <span class="legend-cell" style="background:var(--cell-l2)"></span>
        <span class="legend-cell" style="background:var(--cell-l3)"></span>
        <span class="legend-cell" style="background:var(--cell-l4)"></span>
        <span class="muted small">More</span>
      </div>
    </section>

    <section id="habitList"></section>

    <div class="empty-state" id="emptyState">
      <div class="empty-grid" aria-hidden="true">
        <span></span><span class="on"></span><span></span><span class="on"></span>
        <span class="on"></span><span></span><span class="on"></span><span></span>
        <span></span><span class="on"></span><span class="on"></span><span></span>
      </div>
      <h2>No habits yet</h2>
      <p class="muted">Create your first habit and start filling in the squares.</p>
      <button class="btn btn-primary" id="emptyAddBtn">+ New habit</button>
    </div>
  </main>

  <!-- Add / edit habit dialog -->
  <dialog id="habitDialog">
    <form method="dialog" id="habitForm">
      <h2 id="dialogTitle">New habit</h2>
      <label class="field">
        <span>Name</span>
        <input type="text" id="habitName" maxlength="60" placeholder="e.g. Read 20 minutes" required autocomplete="off">
      </label>
      <div class="field">
        <span>Icon</span>
        <div class="emoji-row" id="emojiRow"></div>
      </div>
      <div class="field">
        <span>Color</span>
        <div class="color-row" id="colorRow"></div>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn btn-danger" id="deleteHabitBtn" hidden>Delete</button>
        <span class="spacer"></span>
        <button type="button" class="btn" id="cancelDialogBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveHabitBtn">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Settings dialog -->
  <dialog id="settingsDialog">
    <h2>Settings</h2>
    <div class="settings-list">
      <button class="btn" id="exportBtn">Export data (JSON)</button>
      <button class="btn" id="importBtn">Import data</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
    <p class="muted small">Data is stored locally on this device. Export regularly if you care about it.</p>
    <div class="dialog-actions">
      <span class="spacer"></span>
      <button class="btn" id="closeSettingsBtn">Close</button>
    </div>
  </dialog>

  <div class="toast" id="toast" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
